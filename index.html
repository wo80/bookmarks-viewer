<!doctype html>
<html lang="en">
<head>
  <title>bookmarks-viewer</title>

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link type="text/css" rel="stylesheet" href="src/style.css" media="screen" />
</head>
<body>
  <div id="sidebar">
    <div id="folders"></div>
  </div>
  <div id="header">
    <div id="toolbar">
      <input class="search" type="text" placeholder="Search all bookmarks" />
    </div>
    <ul id="path">
      <li class="item">&nbsp;</li>
    </ul>
    <hr />
  </div>
  <div class="listview">
  </div>

  <div id="error"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
